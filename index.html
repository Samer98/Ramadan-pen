<!DOCTYPE html>
<html>
<head>
  <title>ramadan pen</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #050301; overflow: hidden; }
    video { display: none; }
    canvas { width: 100%; height: 100%; transform: scaleX(-1); position: absolute; z-index: 1; }
  </style>
</head>
<body>
  <video id="vid"></video>
  <canvas id="c"></canvas>
  <script>
    var vid = document.getElementById('vid');
    var c = document.getElementById('c');
    var ctx = c.getContext('2d');
    var arr = [];
    var cur = [];
    var shift = false;
    var draw = false;
    var sx = null;
    var sy = null;
    var crescentUntil = 0;

    function detectDrawnShape(points) {
      if (!points || points.length < 3) {
        if (points && points.length === 1) return { label: 'dot', emoji: 'white_circle' };
        if (points && points.length === 2) return { label: 'line', emoji: null };
        return { label: 'unknown', emoji: null };
      }
      var n = points.length;
      var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      var pathLen = 0;
      for (var i = 0; i < n; i++) {
        var p = points[i];
        if (p.x < minX) minX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x;
        if (p.y > maxY) maxY = p.y;
        if (i > 0) {
          var dx = p.x - points[i - 1].x, dy = p.y - points[i - 1].y;
          pathLen += Math.sqrt(dx * dx + dy * dy);
        }
      }
      var w = maxX - minX, h = maxY - minY;
      if (w < 2 && h < 2) return { label: 'dot', emoji: 'white_circle' };
      var first = points[0], last = points[n - 1];
      var distFirstLast = Math.hypot(last.x - first.x, last.y - first.y);
      var diag = Math.hypot(w, h) || 1;
      var closed = distFirstLast < diag * 0.3;
      var aspect = Math.max(w, h) / (Math.min(w, h) || 1);
      var compactness = (w + w + h + h) / (pathLen || 1);
      if (aspect > 4 && compactness < 0.5) return { label: 'line', emoji: null };
      if (closed && aspect < 1.8 && compactness > 0.4 && pathLen > diag * 2) return { label: 'circle', emoji: 'full_moon' };
      if (closed && aspect < 1.8 && pathLen > diag * 1.5) return { label: 'oval', emoji: 'large_yellow_circle' };
      var avgLen = pathLen / n;
      if (closed && avgLen < 15 && n > 5) return { label: 'star-like', emoji: 'star' };
      return { label: 'scribble', emoji: null };
    }

    function logDetection(shape) {
      if (shape.emoji) {
        console.log('Detected: :' + shape.emoji + ':');
      } else {
        console.log('Detected: ' + shape.label);
      }
    }

    var ocrPending = false;
    var wordToEmoji = { star: 'star', moon: 'full_moon', heart: 'heart', sun: 'sun_with_face', ramadan: 'crescent_moon' };

    function captureDrawingForOCR() {
      if (arr.length === 0) return null;
      var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (var i = 0; i < arr.length; i++) {
        for (var j = 0; j < arr[i].length; j++) {
          var p = arr[i][j];
          if (p.x < minX) minX = p.x;
          if (p.y < minY) minY = p.y;
          if (p.x > maxX) maxX = p.x;
          if (p.y > maxY) maxY = p.y;
        }
      }
      var pad = 40;
      var w = Math.max(100, maxX - minX + pad * 2);
      var h = Math.max(50, maxY - minY + pad * 2);
      var off = document.createElement('canvas');
      off.width = w;
      off.height = h;
      var octx = off.getContext('2d');
      octx.fillStyle = '#FFFFFF';
      octx.fillRect(0, 0, w, h);
      octx.strokeStyle = '#000000';
      octx.lineWidth = 8;
      octx.lineCap = 'round';
      octx.lineJoin = 'round';
      for (var i = 0; i < arr.length; i++) {
        octx.beginPath();
        for (var j = 0; j < arr[i].length; j++) {
          var px = arr[i][j].x - minX + pad;
          var py = arr[i][j].y - minY + pad;
          if (j === 0) octx.moveTo(px, py);
          else octx.lineTo(px, py);
        }
        octx.stroke();
      }
      return off;
    }

    function recognizeWords() {
      if (typeof Tesseract === 'undefined' || ocrPending || arr.length === 0) return;
      var img = captureDrawingForOCR();
      if (!img) return;
      ocrPending = true;
      Tesseract.recognize(img, 'eng', { logger: function() {} })
        .then(function(result) {
          var text = (result.data.text || '').trim().replace(/\s+/g, ' ');
          ocrPending = false;
          if (text.length > 0) {
            var lower = text.toLowerCase();
            var emojiName = wordToEmoji[lower] || (text.length < 30 ? null : null);
            if (emojiName) {
              console.log('Detected: :' + emojiName + ':');
            } else {
              console.log('Detected: ' + text);
            }
          }
        })
        .catch(function() { ocrPending = false; });
    }

    function drawCrescent(ctx, cx, cy, size) {
      size = size || 80;
      ctx.save();
      ctx.shadowColor = '#F5D061';
      ctx.shadowBlur = 25;
      ctx.fillStyle = '#F5D061';
      ctx.beginPath();
      ctx.arc(cx, cy, size, 0, 2 * Math.PI);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(cx + size * 0.4, cy - size * 0.1, size * 0.7, 0, 2 * Math.PI);
      ctx.fill();
      ctx.restore();
    }

    function startSpeechRecognition() {
      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;
      var rec = new SpeechRecognition();
      rec.continuous = true;
      rec.interimResults = true;
      rec.lang = 'en-US';
      rec.onresult = function(e) {
        for (var i = e.resultIndex; i < e.results.length; i++) {
          var transcript = (e.results[i][0].transcript || '').toLowerCase();
          if (e.results[i].isFinal && /ramadan/.test(transcript)) {
            crescentUntil = Date.now() + 2500;
          }
        }
      };
      rec.start();
      rec.onend = function() { rec.start(); };
    }
    startSpeechRecognition();

    window.onkeydown = function(e) {
      if (e.key == 'Shift') shift = true;
      if (e.code == 'Space') arr = [];
    }
    
    window.onkeyup = function(e) {
      if (e.key == 'Shift') shift = false;
    }

    function run(res) {
      c.width = window.innerWidth;
      c.height = window.innerHeight;
      ctx.drawImage(res.image, 0, 0, c.width, c.height);
      ctx.fillStyle = 'rgba(10, 6, 2, 0.85)';
      ctx.fillRect(0, 0, c.width, c.height);

      ctx.shadowColor = '#F5D061';
      ctx.shadowBlur = 15;
      ctx.strokeStyle = '#F5D061';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      for (var i = 0; i < arr.length; i++) {
        ctx.beginPath();
        for (var j = 0; j < arr[i].length; j++) {
          if (j == 0) ctx.moveTo(arr[i][j].x, arr[i][j].y);
          else ctx.lineTo(arr[i][j].x, arr[i][j].y);
        }
        ctx.stroke();
      }

      if (Date.now() < crescentUntil) {
        drawCrescent(ctx, c.width / 2, c.height / 2, 100);
      }

      if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        var lm = res.multiHandLandmarks[0];
        drawConnectors(ctx, lm, HAND_CONNECTIONS, {color: 'rgba(245, 208, 97, 0.3)', lineWidth: 2});
        drawLandmarks(ctx, lm, {color: '#FFFFFF', lineWidth: 1, radius: 2});

        var ind = lm[8];
        var rx = ind.x * c.width;
        var ry = ind.y * c.height;

        if (sx == null) {
          sx = rx; 
          sy = ry;
        } else {
          sx += (rx - sx) * 0.45;
          sy += (ry - sy) * 0.45;
        }

        ctx.beginPath();
        ctx.arc(sx, sy, 6, 0, 2 * Math.PI);
        if (shift) { 
          ctx.fillStyle = '#FFFFFF'; 
        } else { 
          ctx.fillStyle = 'rgba(245, 208, 97, 0.4)'; 
        }
        ctx.fill();

        if (shift) {
          if (!draw) {
            draw = true;
            cur = [];
            arr.push(cur);
          }
          cur.push({x: sx, y: sy});
        } else {
          if (draw && cur.length > 0) {
            var shape = detectDrawnShape(cur);
            logDetection(shape);
            recognizeWords();
          }
          draw = false;
        }
      } else {
        draw = false;
        sx = null;
      }
    }

    var h = new Hands({
      locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
      }
    });
    
    h.setOptions({ 
      maxNumHands: 1, 
      modelComplexity: 1, 
      minDetectionConfidence: 0.5, 
      minTrackingConfidence: 0.5 
    });
    
    h.onResults(run);

    var cam = new Camera(vid, {
      onFrame: async () => { await h.send({image: vid}); },
      width: 1280, 
      height: 720
    });
    
    cam.start();
  </script>
</body>
</html>
